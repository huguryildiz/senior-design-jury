name: Demo DB Daily Reset

on:
  schedule:
    - cron: '0 4 * * *' # 04:00 UTC (07:00 Turkey)
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run seed SQL against demo database
        env:
          DEMO_DATABASE_URL: ${{ secrets.DEMO_DATABASE_URL }}
        run: psql "$DEMO_DATABASE_URL" -f sql/seeds/002_multi_tenant_seed.sql
