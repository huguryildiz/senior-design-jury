name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          mkdir -p test-results
          npm run test:report

      - name: Generate Excel report
        if: always()
        run: node scripts/generate-test-report.cjs

      - name: Generate Allure HTML report
        if: always()
        run: npm run allure:generate

      - name: Upload Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-excel-${{ github.run_number }}
          path: test-results/test-report.xlsx
          retention-days: 30

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-allure-${{ github.run_number }}
          path: allure-report/
          retention-days: 30
