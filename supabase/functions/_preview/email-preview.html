<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VERA Email Preview</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; background: #111; font-family: sans-serif; color: #fff; }
    nav { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    button { padding: 8px 16px; border-radius: 8px; border: 1px solid #444; background: #1a1a2e; color: #a0aec0; cursor: pointer; font-size: 13px; }
    button.active { background: #6c47ff; color: #fff; border-color: #6c47ff; }
    #preview { background-color: #0f0f1a; padding: 40px 0; border-radius: 12px; }
  </style>
</head>
<body>
  <nav>
    <button class="active" onclick="show('reset', this)">Password Reset</button>
    <button onclick="show('changed', this)">Password Changed</button>
    <button onclick="show('approved', this)">Application Approved</button>
    <button onclick="show('rejected', this)">Application Rejected</button>
    <button onclick="show('pin', this)">Juror PIN</button>
    <button onclick="show('token', this)">Entry Token</button>
  </nav>
  <div id="preview"></div>

  <script>
    function tpl(title, intro, body, ctaLabel) {
      return `
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0f0f1a; padding:40px 0;">
          <tr><td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%; background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%); border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.5);">
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
              <tr><td align="center" style="padding:40px 40px 20px;">
                <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px;"><span style="color:#f1f5f9;">V</span><span style="color:#93c5fd;">ERA</span></div>
              </td></tr>
              <tr><td align="center" style="padding:8px 48px 12px;">
                <h1 style="margin:0; font-size:25px; font-weight:700; color:#ffffff; letter-spacing:-0.5px;">${title}</h1>
              </td></tr>
              <tr><td align="center" style="padding:0 48px 20px;">
                <p style="margin:0; font-size:15px; line-height:1.7; color:#a0aec0;">${intro}</p>
              </td></tr>
              <tr><td align="center" style="padding:0 48px 8px;">
                <p style="margin:0 0 8px; font-size:14px; line-height:1.7; color:#a0aec0;">${body}</p>
              </td></tr>
              <tr><td align="center" style="padding:16px 48px 24px;">
                <a href="#" style="display:inline-block; background:linear-gradient(135deg,#6c47ff,#a78bfa); color:#ffffff; text-decoration:none; font-size:16px; font-weight:600; padding:14px 36px; border-radius:50px; letter-spacing:0.3px; box-shadow:0 4px 20px rgba(108,71,255,0.45);">${ctaLabel} &rarr;</a>
              </td></tr>
              <tr><td style="padding:0 48px;"><div style="border-top:1px solid rgba(255,255,255,0.08); font-size:0;">&nbsp;</div></td></tr>
              <tr><td align="center" style="padding:16px 48px 30px;">
                <p style="margin:0; font-size:12px; color:#4a5568; line-height:1.6;">&copy; 2026 VERA. All rights reserved.</p>
              </td></tr>
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
            </table>
          </td></tr>
        </table>`;
    }

    function tokenTpl() {
      const tokenUrl = "https://vera-eval.app?eval=PREVIEW-TOKEN-2026";
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=12&color=ffffff&bgcolor=1a1a2e&data=${encodeURIComponent(tokenUrl)}`;

      return `
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0f0f1a; padding:40px 0;">
          <tr><td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%; background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%); border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.5);">
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
              <tr><td align="center" style="padding:40px 40px 20px;">
                <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px;"><span style="color:#f1f5f9;">V</span><span style="color:#93c5fd;">ERA</span></div>
              </td></tr>
              <tr><td align="center" style="padding:8px 48px 12px;">
                <h1 style="margin:0; font-size:25px; font-weight:700; color:#ffffff; letter-spacing:-0.5px;">Jury Evaluation Access</h1>
              </td></tr>
              <tr><td align="center" style="padding:0 48px 16px;">
                <p style="margin:0 0 8px; font-size:15px; line-height:1.7; color:#a0aec0;">You have been invited to participate in a jury evaluation — <strong style="color:#fff;">EE 492 · Spring 2026</strong>.</p>
                <p style="margin:0; font-size:14px; line-height:1.7; color:#a0aec0;">Tap the button below or scan the QR code to open the evaluation platform. Your link is valid for <strong style="color:#fff;">24 hours</strong> — use it promptly.</p>
              </td></tr>
              <tr><td align="center" style="padding:8px 48px 20px;">
                <img src="${qrUrl}" alt="Scan to join evaluation" width="180" height="180" style="display:block; margin:0 auto; border-radius:12px;" />
                <p style="margin:10px 0 0; font-size:12px; color:#718096;">Scan with your phone camera</p>
              </td></tr>
              <tr><td align="center" style="padding:4px 48px 16px;">
                <a href="${tokenUrl}" style="display:inline-block; background:linear-gradient(135deg,#6c47ff,#a78bfa); color:#ffffff; text-decoration:none; font-size:16px; font-weight:600; padding:14px 36px; border-radius:50px; letter-spacing:0.3px; box-shadow:0 4px 20px rgba(108,71,255,0.45);">Join Evaluation &rarr;</a>
              </td></tr>
              <tr><td style="padding:0 48px 20px;">
                <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:12px 16px; word-break:break-all;">
                  <p style="margin:0 0 4px; font-size:11px; color:#4a5568; text-transform:uppercase; letter-spacing:0.5px;">Access Link</p>
                  <p style="margin:0; font-size:12px; color:#a0aec0; font-family:monospace;">${tokenUrl}</p>
                </div>
              </td></tr>
              <tr><td style="padding:0 48px;"><div style="border-top:1px solid rgba(255,255,255,0.08); font-size:0;">&nbsp;</div></td></tr>
              <tr><td align="center" style="padding:16px 48px 30px;"><p style="margin:0; font-size:12px; color:#4a5568; line-height:1.6;">&copy; 2026 VERA. All rights reserved.</p></td></tr>
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
            </table>
          </td></tr>
        </table>`;
    }

    function pinTpl() {
      const pin = "4821";
      const digits = pin.split("").map(d =>
        `<span style="display:inline-block;width:52px;height:64px;line-height:64px;text-align:center;background:rgba(255,255,255,0.06);border:2px solid rgba(108,71,255,0.4);border-radius:8px;font-size:36px;font-weight:800;color:#ffffff;font-family:monospace;margin:0 4px;">${d}</span>`
      ).join("");

      return `
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0f0f1a; padding:40px 0;">
          <tr><td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%; background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%); border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.5);">
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
              <tr><td align="center" style="padding:40px 40px 20px;">
                <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px;"><span style="color:#f1f5f9;">V</span><span style="color:#93c5fd;">ERA</span></div>
              </td></tr>
              <tr><td align="center" style="padding:8px 48px 12px;">
                <h1 style="margin:0; font-size:25px; font-weight:700; color:#ffffff; letter-spacing:-0.5px;">Your Evaluation PIN</h1>
              </td></tr>
              <tr><td align="center" style="padding:0 48px 16px;">
                <p style="margin:0 0 8px; font-size:15px; line-height:1.7; color:#a0aec0;">Hello, <strong style="color:#fff;">Dr. Ayşe Kaya</strong>.</p>
                <p style="margin:0 0 8px; font-size:14px; line-height:1.7; color:#a0aec0;">Electrical Engineering · TEDU</p>
                <p style="margin:0 0 8px; font-size:14px; line-height:1.7; color:#a0aec0;">Your jury evaluation PIN has been set. Use it to authenticate when you access the evaluation platform. Keep it confidential — it will not be shown again.</p>
                <p style="margin:0; font-size:13px; color:#718096;">Evaluation period: <strong style="color:#a0aec0;">EE 492 — Spring 2026</strong></p>
              </td></tr>
              <tr><td align="center" style="padding:12px 48px 20px;">
                <div style="display:inline-block; padding:24px 20px; background:rgba(0,0,0,0.3); border-radius:12px; border:1px solid rgba(108,71,255,0.3);">
                  ${digits}
                </div>
                <p style="margin:12px 0 0; font-size:11px; color:#4a5568;">This PIN will not be shown again after this email.</p>
              </td></tr>
              <tr><td align="center" style="padding:4px 48px 28px;">
                <a href="#" style="display:inline-block; background:linear-gradient(135deg,#6c47ff,#a78bfa); color:#ffffff; text-decoration:none; font-size:16px; font-weight:600; padding:14px 36px; border-radius:50px; letter-spacing:0.3px; box-shadow:0 4px 20px rgba(108,71,255,0.45);">Join Evaluation &rarr;</a>
              </td></tr>
              <tr><td style="padding:0 48px;"><div style="border-top:1px solid rgba(255,255,255,0.08); font-size:0;">&nbsp;</div></td></tr>
              <tr><td align="center" style="padding:16px 48px 30px;"><p style="margin:0; font-size:12px; color:#4a5568; line-height:1.6;">&copy; 2026 VERA. All rights reserved.</p></td></tr>
              <tr><td style="background:linear-gradient(90deg,#6c47ff,#a78bfa,#6c47ff); height:4px; font-size:0; line-height:0;">&nbsp;</td></tr>
            </table>
          </td></tr>
        </table>`;
    }

    const templates = {
      reset:    tpl("Reset Password",       "There is a password reset request for your VERA account.",        "Use the button below to create your new password.",                                          "Reset Password"),
      changed:  tpl("Password Changed",     "Your VERA account password was successfully updated.",            "If you did not make this change, please contact support immediately.",                     "Go to VERA"),
      approved: tpl("Application Approved", "Your VERA admin application has been approved.",                  "You can now sign in to your account and start managing your organization.",               "Sign In"),
      rejected: tpl("Application Update",   "Unfortunately, your VERA admin application was not approved.",    "If you think this is a mistake, please reach out to the platform administrator.",         "Contact Support"),
      pin:      pinTpl(),
      token:    tokenTpl(),
    };

    function show(key, btn) {
      document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("preview").innerHTML = templates[key];
    }

    document.getElementById("preview").innerHTML = templates.reset;
  </script>
</body>
</html>
